<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Polyweave · Wireframes</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Kalam:wght@300;400;700&family=Special+Elite&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="wireframe.css" />
<style>
  body { margin: 0; background: #ece7dc; font-family: 'Kalam', sans-serif; }
  .canvas-host { width: 100vw; height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root" class="canvas-host"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wireframe-shared.jsx"></script>
<script type="text/babel" src="home-a.jsx"></script>
<script type="text/babel" src="home-b.jsx"></script>
<script type="text/babel" src="home-c.jsx"></script>
<script type="text/babel" src="inner-pages.jsx"></script>
<script type="text/babel" src="seo-pages.jsx"></script>

<script type="text/babel">
const { useState } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showStickyForm": true,
  "showMap": true,
  "showProof": true,
  "density": "airy"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const homeProps = {
    showSticky: tweaks.showStickyForm,
    showMap: tweaks.showMap,
    showProof: tweaks.showProof,
  };

  return (
    <>
      <DesignCanvas title="Polyweave · Wireframes" subtitle="Direction A (Editorial) — color-blocked. Home + About / Services / Contact.">
        <DCSection id="home" title="Homepage — Direction A (color-blocked)">
          <DCArtboard id="home-a" label="Home · Editorial (color-blocked)" width={1200} height={3750}>
            <HomeA {...homeProps} />
          </DCArtboard>
        </DCSection>

        <DCSection id="inner" title="Inner pages">
          <DCArtboard id="about" label="About" width={1200} height={2450}>
            <AboutPage showSticky={tweaks.showStickyForm} showMap={tweaks.showMap} />
          </DCArtboard>
          <DCArtboard id="services" label="Services" width={1200} height={2320}>
            <ServicesPage showSticky={tweaks.showStickyForm} />
          </DCArtboard>
          <DCArtboard id="contact" label="Contact" width={1200} height={1620}>
            <ContactPage showSticky={false} />
          </DCArtboard>
        </DCSection>

        <DCSection id="seo" title="SEO landing pages — India sourcing intent">
          {Object.values(SEO_PAGES).map((d) => (
            <DCArtboard key={d.slug} id={`seo-${d.slug}`} label={d.label} width={1200} height={2950}>
              <SEOPage data={d} showSticky={tweaks.showStickyForm} />
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Show / hide">
          <TweakToggle
            label="Sticky 'send your price' rail"
            value={tweaks.showStickyForm}
            onChange={(v) => setTweak('showStickyForm', v)}
          />
          <TweakToggle
            label="India ↔ Europe map sketches"
            value={tweaks.showMap}
            onChange={(v) => setTweak('showMap', v)}
          />
          <TweakToggle
            label="Proof / numbers section"
            value={tweaks.showProof}
            onChange={(v) => setTweak('showProof', v)}
          />
        </TweakSection>
        <TweakSection title="Notes">
          <div style={{ fontSize: 12, lineHeight: 1.5, color: '#555' }}>
            Color-blocked editorial wireframe. Sea blue · navy · beige used as section beds, accent words, and tinted cards.
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
