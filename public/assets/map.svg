<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" preserveAspectRatio="xMidYMid meet">
  <rect width="360" height="200" fill="rgba(46,111,142,0.04)" stroke="#14233A" stroke-width="1.25" rx="4"/>

  <!-- Europe label -->
  <text x="60" y="180" font-family="monospace" font-size="9" fill="#8A91A0" text-anchor="middle" letter-spacing="1.5">EUROPE</text>

  <!-- India label -->
  <text x="300" y="180" font-family="monospace" font-size="9" fill="#8A91A0" text-anchor="middle" letter-spacing="1.5">INDIA</text>

  <!-- Dotted line connecting Europe to India -->
  <line x1="80" y1="100" x2="280" y2="100" stroke="#2E6F8E" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Arrow in the middle -->
  <circle cx="180" cy="100" r="12" fill="#F7F4EE" stroke="#2E6F8E" stroke-width="1.5"/>
  <text x="180" y="104" font-family="monospace" font-size="8" fill="#2E6F8E" text-anchor="middle">↔</text>

  <!-- Placeholder text -->
  <text x="180" y="40" font-family="cursive" font-size="20" fill="#14233A" text-anchor="middle">Drop your map here</text>
  <text x="180" y="60" font-family="monospace" font-size="8" fill="#4A5468" text-anchor="middle" letter-spacing="1.5">UPLOAD TO assets/map.svg</text>
</svg>